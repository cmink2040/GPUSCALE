name: Build & Push Benchmark Image

on:
  push:
    branches: [main]
    paths:
      - "bench-container/**"
      - ".github/workflows/build-bench.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-llamacpp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/cmink2040/gpuscale-bench
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: bench-container
          file: bench-container/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=llamacpp
          cache-to: type=gha,mode=max,scope=llamacpp

