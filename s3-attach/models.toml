# Models configuration for GPUSCALE benchmark suite.
#
# Each [[models]] entry defines a model available for benchmarking.
# - repo_id: Canonical model identifier (org/model)
# - source: Download source — "meta" for Meta's official distribution, "huggingface" (default)
# - meta_model_id: Meta CLI model ID (required when source = "meta")
#
# Each [[models.formats]] entry defines a weight format:
# - type: "full", "gguf", or "gptq"
# - storage: Where the model lives at benchmark time:
#     "huggingface" (default) — public, pulled directly from HF Hub by the runner
#     "s3"                    — private/gated/meta, hosted on Wasabi S3 via s3-attach
#
# s3-attach only manages formats with storage = "s3".
# Formats with storage = "huggingface" are pulled directly by virt-runner at benchmark time.

# =============================================================================
# Meta Llama — full weights from Meta (private, requires signed URL),
#              quants from community repos (public)
# =============================================================================

[[models]]
repo_id = "meta-llama/Llama-3.1-8B-Instruct"
source = "meta"
meta_model_id = "Llama3.1-8B-Instruct"

    [[models.formats]]
    type = "full"
    storage = "s3"  # Meta-distributed, download via signed URL then upload to S3

    [[models.formats]]
    type = "gguf"
    storage = "huggingface"
    quants = ["Q4_K_M", "Q8_0"]
    gguf_repo_id = "bartowski/Meta-Llama-3.1-8B-Instruct-GGUF"

    [[models.formats]]
    type = "gptq"
    storage = "huggingface"
    variant = "4bit-128g"
    gptq_repo_id = "TechxGenus/Meta-Llama-3.1-8B-Instruct-GPTQ"

# =============================================================================
# Mistral — fully public on HuggingFace, no S3 needed
# =============================================================================

[[models]]
repo_id = "mistralai/Mistral-7B-Instruct-v0.3"

    [[models.formats]]
    type = "full"
    storage = "huggingface"

    [[models.formats]]
    type = "gguf"
    storage = "huggingface"
    quants = ["Q4_K_M", "Q5_K_M"]
    gguf_repo_id = "bartowski/Mistral-7B-Instruct-v0.3-GGUF"
